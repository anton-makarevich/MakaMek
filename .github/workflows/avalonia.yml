name: MakaMek Avalonia Library
permissions:
  contents: read
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

  pull_request:
    paths:
      - 'src/MakaMek.Avalonia/**'
      - 'src/MakaMek.Presentation/**'
      - 'src/MakaMek.Bots/**'
      - 'src/MakaMek.Core/**'
      - 'src/MakaMek.SourceGenerators/**'
      - 'tests/MakaMek.Avalonia.Tests/**'
      - '.github/workflows/avalonia.yml'

  workflow_dispatch:
env:
  NuGetDirectory: ${{ github.workspace }}/nuget
  
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.x

      - name: Run Avalonia tests
        run: dotnet test tests/MakaMek.Avalonia.Tests/MakaMek.Avalonia.Tests.csproj /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:ExcludeByAttribute=GeneratedCodeAttribute "/p:Include=\"[Sanet.MakaMek.Avalonia]Sanet.MakaMek.Avalonia.Converters*,[Sanet.MakaMek.Avalonia]Sanet.MakaMek.Avalonia.Game*\""

      - name: Diff coverage report
        if: github.event_name == 'pull_request'
        uses: anton-makarevich/Cocodif@v0.2.1
        with:
          coverage-files: ./tests/MakaMek.Avalonia.Tests/coverage.opencover.xml
          title: Avalonia Coverage
          comment-marker: '<!-- cocodif-avalonia -->'
          include: 'src/MakaMek.Avalonia/**'
          exclude: '**/obj/**,**/bin/**'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Avalonia tests results
        uses: codecov/codecov-action@v7
        with:
          files: ./tests/MakaMek.Avalonia.Tests/coverage.opencover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
  
  publish-nuget:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
        
      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.x

      - name: Determine version suffix
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION_SUFFIX=" >> $GITHUB_ENV
          else
            echo "VERSION_SUFFIX=preview" >> $GITHUB_ENV
          fi

      - name: Create nuget packages
        run: |
          dotnet pack src/MakaMek.Avalonia/MakaMek.Avalonia/MakaMek.Avalonia.csproj --configuration Release --output ${{ env.NuGetDirectory }} -p:VersionSuffix=${{ env.VERSION_SUFFIX }}

      - name: Publish NuGet package
        run: |
          for file in "${{ env.NuGetDirectory }}"/*.nupkg; do
            dotnet nuget push "$file" --api-key "${{ secrets.NUGET_APIKEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
