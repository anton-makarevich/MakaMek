name: MakaMek Core Library
permissions:
  pull-requests: write
  contents: read
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

  pull_request:
    paths:
      - 'src/MakaMek.Core/**'
      - 'src/MakaMek.SourceGenerators/**'
      - 'tests/MakaMek.Core.Tests/**'
      - '.github/workflows/core.yml'
  workflow_dispatch:
env:
  NuGetDirectory: ${{ github.workspace }}/nuget
  
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      COVERAGE_EXCLUSIONS: "**/FileCommandLogger.cs"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.x

      - name: Run Core tests
        run: dotnet test tests/MakaMek.Core.Tests/MakaMek.Core.Tests.csproj /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:ExcludeByAttribute=GeneratedCodeAttribute /p:Include=[Sanet.MakaMek.Core]* /p:ExcludeByFile="${{ env.COVERAGE_EXCLUSIONS }}"

      - name: Upload Core tests results
        uses: codecov/codecov-action@v7
        with:
          files: ./tests/MakaMek.Core.Tests/coverage.opencover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: core
          fail_ci_if_error: true

      - name: Diff coverage report
        if: github.event_name == 'pull_request'
        uses: anton-makarevich/Cocodif@main
        with:
          coverage-files: ./tests/MakaMek.Core.Tests/coverage.opencover.xml
          title: Core Coverage
          comment-marker: '<!-- cocodif-core -->'
          include: 'src/MakaMek.Core/**'
          exclude: '**/obj/**,**/bin/**'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  publish-nuget:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        
      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.x

      - name: Determine version suffix
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION_SUFFIX=" >> $GITHUB_ENV
          else
            echo "VERSION_SUFFIX=preview" >> $GITHUB_ENV
          fi

      - name: Create nuget packages
        run: |
          dotnet pack src/MakaMek.Core/MakaMek.Core.csproj --configuration Release --output ${{ env.NuGetDirectory }} -p:VersionSuffix=${{ env.VERSION_SUFFIX }}

      - name: Publish NuGet package
        run: |
          for file in "${{ env.NuGetDirectory }}"/*.nupkg; do
            dotnet nuget push "$file" --api-key "${{ secrets.NUGET_APIKEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done