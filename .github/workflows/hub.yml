name: MakaMek Hub
permissions:
  contents: read
on:
  push:
    branches:
      - main

  pull_request:
    paths:
      - 'src/MakaMek.Hub/**'
      - 'tests/MakaMek.Hub.Tests/**'
      - '.github/workflows/hub.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.x

      - name: Run Hub tests
        run: dotnet test tests/MakaMek.Hub.Tests/MakaMek.Hub.Tests.csproj /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:ExcludeByAttribute=GeneratedCodeAttribute /p:Include=[Sanet.MakaMek.Hub]*

      - name: Upload Hub tests results
        uses: codecov/codecov-action@v7
        with:
          files: ./tests/MakaMek.Hub.Tests/coverage.opencover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: hub
          fail_ci_if_error: true

      - name: Diff coverage report
        if: github.event_name == 'pull_request'
        uses: anton-makarevich/Cocodif@v0.1.2
        with:
          coverage-files: ./tests/MakaMek.Hub.Tests/coverage.opencover.xml
          title: Hub Coverage
          comment-marker: '<!-- cocodif-hub -->'
          include: 'src/MakaMek.Hub/**'
          exclude: '**/obj/**,**/bin/**'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
