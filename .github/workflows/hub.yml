name: MakaMek Hub
permissions:
  contents: read
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

  pull_request:
    paths:
      - 'src/MakaMek.Hub/**'
      - 'tests/MakaMek.Hub.Tests/**'
      - '.github/workflows/hub.yml'
  workflow_dispatch:
env:
  NuGetDirectory: ${{ github.workspace }}/nuget

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.x

      - name: Run Hub tests
        run: dotnet test tests/MakaMek.Hub.Tests/MakaMek.Hub.Tests.csproj /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:ExcludeByAttribute=GeneratedCodeAttribute /p:Include=[Sanet.MakaMek.Hub]*

      - name: Upload Hub tests results
        uses: codecov/codecov-action@v7
        with:
          files: ./tests/MakaMek.Hub.Tests/coverage.opencover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: hub
          fail_ci_if_error: true

  publish-nuget:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.x

      - name: Determine version suffix
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION_SUFFIX=" >> $GITHUB_ENV
          else
            echo "VERSION_SUFFIX=preview" >> $GITHUB_ENV
          fi

      - name: Create nuget packages
        run: |
          dotnet pack src/MakaMek.Hub/MakaMek.Hub.csproj --configuration Release --output ${{ env.NuGetDirectory }} -p:VersionSuffix=${{ env.VERSION_SUFFIX }}

      - name: Publish NuGet package
        run: |
          for file in "${{ env.NuGetDirectory }}"/*.nupkg; do
            dotnet nuget push "$file" --api-key "${{ secrets.NUGET_APIKEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
